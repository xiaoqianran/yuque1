name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yuque
          POSTGRES_PASSWORD: localdevonly
          POSTGRES_DB: yuque1
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yuque -d yuque1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://yuque:localdevonly@localhost:5432/yuque1?schema=public
      REDIS_URL: redis://localhost:6379
      SMS_PROVIDER: mock
      SMS_MOCK_CODE: '123456'
      SESSION_SECRET: ci-session-secret-not-for-production-use
      CORS_ORIGIN: http://localhost:5173
      COOKIE_SECURE: 'false'
      API_PORT: '3000'
      # unit tests use MemoryKv via explicit injection; runtime CI uses Redis service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        run: |
          pnpm db:generate
          pnpm db:migrate

      - name: CI (typecheck, test, build)
        run: pnpm run check:node && pnpm run check:docs && pnpm run typecheck && pnpm run test && pnpm run build
