# Usage (from monorepo root):
#   pnpm compose:up
#   pnpm db:migrate:docker   # when host cannot reach published 5432 (DinD / 嵌套网络)

services:
  postgres:
    image: postgres:16-alpine
    container_name: yuque1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuque
      POSTGRES_PASSWORD: localdevonly
      POSTGRES_DB: yuque1
    ports:
      - '5432:5432'
    volumes:
      - yuque1_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yuque -d yuque1']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yuque1-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - yuque1_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot migrate on the compose network (hostname: postgres)
  migrate:
    image: node:22-bookworm
    profiles: ['tools']
    working_dir: /app
    volumes:
      - ../../apps/api:/app
      - ../../node_modules:/repo_node_modules:ro
    environment:
      DATABASE_URL: postgresql://yuque:localdevonly@postgres:5432/yuque1?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - |
        set -euo pipefail
        npm install -g prisma@6.19.3 >/dev/null
        prisma migrate deploy --schema=prisma/schema.prisma

volumes:
  yuque1_pg_data:
  yuque1_redis_data:
