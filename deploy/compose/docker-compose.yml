services:
  postgres:
    image: postgres:16-alpine
    container_name: yuque1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuque
      POSTGRES_PASSWORD: localdevonly
      POSTGRES_DB: yuque1
    ports:
      - '5432:5432'
    volumes:
      - yuque1_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yuque -d yuque1']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yuque1-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - yuque1_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  yuque1_pg_data:
  yuque1_redis_data:
